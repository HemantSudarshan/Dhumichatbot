services:
  - type: web
    name: intermarq-chatbot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.rag.embed_knowledge && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
