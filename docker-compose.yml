version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Intermarq Agency — Docker Compose
#
#  Services:
#    api      → FastAPI RAG backend (port 8000)
#    frontend → Static file server for demo UI (port 8080)
#
#  Usage:
#    docker-compose up -d --build
#    docker-compose logs -f api
#    docker-compose down
# ─────────────────────────────────────────────────────────────

services:

  # ── RAG Backend ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    container_name: intermarq-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # API Keys — override via .env or CI secrets
      GROQ_API_KEY:        ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY:  ${OPENROUTER_API_KEY:-}
      OLLAMA_URL:          ${OLLAMA_URL:-http://host.docker.internal:11434}
      # Model overrides (optional)
      GROQ_MODEL:          ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENROUTER_MODEL:    ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      OLLAMA_MODEL:        ${OLLAMA_MODEL:-llama3.2}
      # CORS — allow frontend container
      CORS_ORIGINS:        "http://localhost:8080,http://frontend:8080"
      # MLflow — persisted in named volume
      MLFLOW_TRACKING_URI: /app/mlruns
    volumes:
      # Persist MLflow telemetry across restarts (per engineer feedback)
      - mlruns_data:/app/mlruns
      # Persist ChromaDB index across restarts
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Static Frontend ──────────────────────────────────────────
  frontend:
    image: python:3.11-slim
    container_name: intermarq-frontend
    restart: unless-stopped
    working_dir: /srv
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    volumes:
      # Mount the entire project root so /demo and /knowledge are accessible
      - ./:/srv:ro
    depends_on:
      api:
        condition: service_healthy

  # ── MLflow UI (optional — for viewing telemetry dashboards) ──
  mlflow-ui:
    image: python:3.11-slim
    container_name: intermarq-mlflow
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - mlruns_data:/app/mlruns
    depends_on:
      - api
    profiles:
      - observability   # Only starts with: docker-compose --profile observability up


volumes:
  mlruns_data:
    driver: local
  chroma_data:
    driver: local
